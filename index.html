<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UJIAN ONLINE CBT</title>
  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/9/98/Kota_Bengkulu.png" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #eee;
      overflow: hidden; /* Mencegah scroll ganda */
    }

    .iframe-container {
      width: 100%;
      height: 100dvh; 
      overflow: hidden;
      position: relative;
    }

    iframe {
      display: block;
      width: 100%;
      /* Meningkatkan tinggi iframe agar bagian bawah tidak terpotong 
        setelah digeser ke atas sebesar 45px
      */
      height: calc(100% + 45px); 
      border: none;
      /* TRIK UTAMA: Menggeser iframe ke atas untuk 
        menyembunyikan spanduk biru Google
      */
      margin-top: -45px; 
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <iframe
      id="app"
      src="https://script.google.com/macros/s/AKfycbxYZOTzEBaRr9AUTczvO603eP077o8cg24nOD8dT1eOmOw3NYfOzRVQmyHYJsu9bnSN2A/exec"
      scrolling="yes"
      allowfullscreen="true"
      webkitallowfullscreen="true"
      mozallowfullscreen="true"
      allow="fullscreen; camera; microphone; display-capture; geolocation;">
    </iframe>
  </div>
</body>
</html>
